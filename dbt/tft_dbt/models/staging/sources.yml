version: 2

sources:
  - name: bronze
    database: "tft-gcp-integration"
    schema: tft_bronze
    description: "Dados brutos vindos do GCS via External Table"
    tables:
      - name: raw_matches
        description: "JSON completo de cada partida TFT — 1 linha por arquivo"
        columns:
          - name: metadata
            description: "Bloco metadata da Riot API (match_id, participants puuids)"
          - name: info
            description: "Bloco info da Riot API (game_datetime, participants, traits, units)"
          - name: date
            description: "Partição Hive — data de ingestão"