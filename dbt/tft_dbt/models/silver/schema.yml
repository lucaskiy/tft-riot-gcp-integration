version: 2

models:
  - name: fact_player_results
    description: "Uma linha por jogador por partida — resultado e arrays raw"
    columns:
      - name: match_id
        tests: [not_null]
      - name: puuid
        tests: [not_null]
      - name: placement
        tests:
          - not_null
      - name: win
        tests: [not_null]
      - name: level

  - name: fact_traits
    description: "Uma linha por trait por jogador por partida"
    columns:
      - name: match_id
        tests: [not_null]
      - name: puuid
        tests: [not_null]
      - name: trait_name
        tests: [not_null]
      - name: tier_current
        tests: [not_null]

  - name: fact_units
    description: "Uma linha por unidade por jogador por partida"
    columns:
      - name: match_id
        tests: [not_null]
      - name: puuid
        tests: [not_null]
      - name: character_id
        tests: [not_null]
      - name: tier