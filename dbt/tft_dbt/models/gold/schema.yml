version: 2

models:
  - name: core_comp_winrate
    description: >
      Estatísticas de taxa de top4 e vitória para as composições centrais (core comps) de cada unidade, considerando traits primárias e secundárias.
    columns:
      - name: core_key
        tests: [not_null]
      - name: core_key_display
        tests: [not_null]
      - name: primary_trait
        tests: [not_null]
      - name: top4_rate
        tests: [not_null]
      - name: win_rate
        tests: [not_null]

  - name: unit_winrate
    description: "Taxa de top4 e vitória por unidade e tier"
    columns:
      - name: character_id
        tests: [not_null]
      - name: top4_rate
        tests: [not_null]
      - name: win_rate
        tests: [not_null]

  - name: item_combo_winrate
    description: "Taxa de top4 e vitória por combinação de itens e tier"
    columns:
      - name: character_id
        tests: [not_null]
      - name: item_combo
        tests: [not_null]
      - name: top4_rate
        tests: [not_null]
      - name: win_rate
        tests: [not_null]
